name: KijiYomu

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true  # go module cache

      # キャッシュリストア: key が存在しなくても restore-keys で最新を取得
      - name: Restore KijiYomu cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .kijiyomu_cache.json
          key: kijiyomu-cache-${{ github.run_id }}
          restore-keys: |
            kijiyomu-cache-

      - name: Run KijiYomu
        env:
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: go run main.go

      # 常に最新状態で保存（key に run_id を含めることで毎回新規保存）
      - name: Save KijiYomu cache
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .kijiyomu_cache.json
          key: kijiyomu-cache-${{ github.run_id }}

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp kijiyomu.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
